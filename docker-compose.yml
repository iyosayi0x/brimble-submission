services:
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
      target: ${ENVIRONMENT:-runner}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app/
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brimble-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      target: ${ENVIRONMENT:-runner}
    networks:
      - brimble-net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    environment:
      - FRONTEND_PORT=80
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - brimble-net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

networks:
  brimble-net:
    driver: bridge

volumes:
  pgdata:
