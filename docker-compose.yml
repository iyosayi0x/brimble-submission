services:
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
      target: ${ENVIRONMENT:-runner}
    init: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app/
      - /app/node_modules
      - /app/dist
    env_file: .env
    environment:
      BUILDKIT_HOST: docker-container://buildkit
    depends_on:
      db:
        condition: service_healthy
      buildkit:
        condition: service_started
    networks:
      - brimble-net
    restart: unless-stopped

  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    networks:
      - brimble-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      target: ${ENVIRONMENT:-runner}
      args:
        VITE_BASE_URL: ${VITE_BASE_URL}
    env_file: .env
    volumes:
      - ./frontend:/app/
      - /app/node_modules
    networks:
      - brimble-net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-runner}
    # Pick the upstream port from ENVIRONMENT so a single var drives both
    # the frontend build target and the port Caddy dials: dev → Vite on
    # 5173, anything else → nginx on 80.
    entrypoint:
      - sh
      - -c
      - |
        case "$$ENVIRONMENT" in
          dev) export FRONTEND_PORT=5173 ;;
          *) export FRONTEND_PORT=80 ;;
        esac
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - brimble-net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - brimble-net

networks:
  brimble-net:
    name: brimble-net
    driver: bridge

volumes:
  pgdata:
